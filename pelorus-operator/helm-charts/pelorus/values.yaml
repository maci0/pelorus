# Default values for deploy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Prometheus basic auth credentials
# REQUIRED when oauth_proxy_enabled is true (the default).
# The chart will fail to render without these values.
# To generate: htpasswd -s -b -n internal <your-password>
# openshift_prometheus_htpasswd_auth: "internal:{SHA}<your-hash>"
# openshift_prometheus_basic_auth_pass: "<your-password>"

# Operator source: "redhat" uses built-in OpenShift monitoring + Cluster Observability Operator
#                  "community" uses community Prometheus + Grafana operators
# Set to "redhat" on OpenShift 4.20+ with monitoring enabled (crc config set enable-cluster-monitoring true)
operator_source: community

# OAuth proxy configuration
# Set to false to disable OAuth proxy sidecars on Prometheus and Grafana
oauth_proxy_enabled: true
# Override the OAuth proxy image (defaults to the cluster's built-in image)
# oauth_proxy_image: image-registry.openshift-image-registry.svc.cluster.local:5000/openshift/oauth-proxy:v4.4

# Automatically set OpenShift's in-built prometheus stack as a federation point so Pelorus can use OpenShift metrics in Dashboards
federate_openshift_monitoring:
  enabled: false
#   metrics_filter: null

# federated_prometheus_hosts:
# external_prometheus_hosts:

# Uncomment this if your cluster serves privately signed certificates
# custom_ca: true

# Thanos / S3 Storage with noobaa
# thanos_bucket_name: thanos
# bucket_access_point: s3.pelorus.svc:443
# bucket_access_key:
# bucket_secret_access_key:
# thanos_insecure_skip_verify: false

## Persistent storage for Prometheus Operator
# https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/user-guides/storage.md

# Set to true to use PVC for Prometheus
prometheus_storage: false

# Additional configuration options for Prometheus PVC
prometheus_storage_pvc_capacity: 2Gi
prometheus_storage_pvc_storageclass: "gp2"

# Set Prometheus retention time. Older data values are deleted
prometheus_retention: 1y
# Set Prometheus retention size. If data grows over this size, old values are deleted.
# This should be lower than what's defined in prometheus_storage_pvc_capacity.
prometheus_retention_size: 1GB

exporters:
  instances:
    - app_name: deploytime-exporter
      exporter_type: deploytime

    - app_name: failuretime-exporter
      exporter_type: failure

    - app_name: committime-exporter
      exporter_type: committime

    - app_name: webhook-exporter
      exporter_type: webhook
