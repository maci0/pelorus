apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pelorus
spec:
  groups:
  - name: software-delivery-performance
    rules:
    - record: sdp:applications
      expr: >
        sdp:lead_time:by_app or count by (app) (deploy_timestamp) or sdp:time_to_restore:by_app or sdp:change_failure_rate:by_app

    - record: sdp:lead_time:by_commit
      expr: >
        min by (app, commit, commit_link, image_sha) (deploy_timestamp - on(app,image_sha) group_left(commit, commit_link) commit_timestamp)
    - record: sdp:lead_time:by_app
      expr: >
        avg by (app) (sdp:lead_time:by_commit)
    - record: sdp:lead_time:global
      expr: >
        avg(sdp:lead_time:by_app)

    - record: sdp:time_to_restore:by_issue
      expr: >
        failure_resolution_timestamp{app!="unknown"} - max_over_time(failure_creation_timestamp{app!="unknown"}[5y])
    - record: sdp:time_to_restore:by_app
      expr: >
        avg by (app) (sdp:time_to_restore:by_issue)
    - record: sdp:time_to_restore:global
      expr: >
        avg (sdp:time_to_restore:by_app)

    - record: sdp:change_failure_rate:by_app
      expr: >
        (count by (app) (failure_creation_timestamp{app!="unknown"}) or sdp:lead_time:by_app * 0) / count by (app) (sdp:lead_time:by_commit)
    - record: sdp:change_failure_rate:global
      expr: >
        avg(sdp:change_failure_rate:by_app)

  - name: pelorus-exporter-health
    rules:
    - alert: PelorusExporterDown
      expr: up{job=~".*pelorus.*"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pelorus exporter {{ "{{" }} $labels.job {{ "}}" }} is down"
        description: "The exporter {{ "{{" }} $labels.job {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} has been unreachable for 5 minutes."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusExporterDown/"

    - alert: PelorusCollectionErrors
      expr: >
        rate(pelorus_deploytime_collection_errors_total[10m]) > 0
        or rate(pelorus_committime_collection_errors_total[10m]) > 0
        or rate(pelorus_failure_collection_errors_total[10m]) > 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus exporter {{ "{{" }} $labels.job {{ "}}" }} is failing to collect metrics"
        description: "The exporter {{ "{{" }} $labels.job {{ "}}" }} has had collection errors for 10 minutes. Check exporter logs."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusCollectionErrors/"

    - alert: PelorusCollectionSlow
      expr: >
        pelorus_deploytime_collection_duration_seconds > 120
        or pelorus_committime_collection_duration_seconds > 120
        or pelorus_failure_collection_duration_seconds > 120
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus exporter {{ "{{" }} $labels.job {{ "}}" }} collection is slow"
        description: "Metric collection is taking {{ "{{" }} $value {{ "}}" }}s (threshold: 120s). External API or cluster connectivity may be degraded."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusCollectionSlow/"

    - alert: PelorusNoDeployData
      expr: absent(deploy_timestamp) == 1
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "No deploy_timestamp metrics are being collected"
        description: "The deploytime exporter has not produced any deploy_timestamp metrics for 30 minutes."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusNoDeployData/"

    - alert: PelorusNoCommitData
      expr: absent(commit_timestamp) == 1
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "No commit_timestamp metrics are being collected"
        description: "The committime exporter has not produced any commit_timestamp metrics for 30 minutes. Lead time calculations will be unavailable."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusNoCommitData/"

    - alert: PelorusNoFailureData
      expr: absent(failure_creation_timestamp) == 1
      for: 60m
      labels:
        severity: warning
      annotations:
        summary: "No failure_creation_timestamp metrics are being collected"
        description: "The failure exporter has not produced any failure metrics for 60 minutes. MTTR and change failure rate calculations will be unavailable."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusNoFailureData/"

    - alert: PelorusWebhookErrorRate
      expr: rate(webhook_errors_total[5m]) / (rate(webhook_received_total[5m]) > 0) > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus webhook error rate is above 10%"
        description: "{{ "{{" }} $value | humanizePercentage {{ "}}" }} of webhooks are failing. Check webhook logs and sender configuration."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusWebhookErrorRate/"

    - alert: PelorusWebhookStoreNearCapacity
      expr: pelorus_webhook_store_utilization / 10000 > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus webhook in-memory store for {{ "{{" }} $labels.metric_family {{ "}}" }} is above 80% capacity"
        description: "The in-memory metric store holds {{ "{{" }} $value | humanizePercentage {{ "}}" }} of its 10,000 entry limit. Oldest entries will be dropped when full."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusWebhookStoreNearCapacity/"

    - alert: PelorusBuildFailures
      expr: rate(pelorus_committime_build_failures_total[10m]) > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus commit time collector is experiencing build failures"
        description: "Individual build metric collection has been failing for 15 minutes. Some commit timestamps may be missing."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusBuildFailures/"

    - alert: PelorusSkopeoWorkerErrors
      expr: rate(pelorus_committime_skopeo_errors_total[10m]) > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Pelorus skopeo background worker is experiencing errors"
        description: "The container image label lookup worker has had persistent errors for 15 minutes. Commit time metrics from container images may be incomplete."
        runbook_url: "https://pelorus.readthedocs.io/en/latest/runbooks/PelorusSkopeoWorkerErrors/"
