apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
##
## Base operator rules
##
# We need to get namespaces so the operator can read namespaces to ensure they exist
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
# We need to manage Helm release secrets
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# We need to create events on CRs about things happening during reconciliation
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
# We need to be able to list CRDS
- apiGroups:
  - "apiextensions.k8s.io"
  resources:
  - "customresourcedefinitions"
  verbs:
  - get
  - list
##
## Rules for charts.pelorus.dora-metrics.io/v1alpha1, Kind: Pelorus
##
- apiGroups:
  - charts.pelorus.dora-metrics.io
  resources:
  - peloruses
  - peloruses/status
  - peloruses/finalizers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  - bind
  - escalate
  apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "clusterrolebindings"
  - "clusterroles"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - "image.openshift.io"
  resources:
  - "imagestreams"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - "monitoring.coreos.com"
  resources:
  - "prometheuses"
  - "prometheuses/api"
  - "prometheusrules"
  - "servicemonitors"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - "route.openshift.io"
  resources:
  - "routes"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - ""
  resources:
  - "configmaps"
  - "secrets"
  - "serviceaccounts"
  - "services"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "rolebindings"
  - "roles"
- verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  apiGroups:
  - "apps"
  resources:
  - "deployments"

##
## Permissions the operator must hold to grant to exporter/prometheus SAs
## (RBAC escalation prevention requires the granter to hold the permissions)
##
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  - endpoints
  - replicationcontrollers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "apps"
  - "extensions"
  resources:
  - replicasets
  verbs:
  - list
- apiGroups:
  - "build.openshift.io"
  resources:
  - builds
  verbs:
  - get
  - list
- apiGroups:
  - "image.openshift.io"
  resources:
  - images
  verbs:
  - list
- apiGroups:
  - "grafana.integreatly.org"
  resources:
  - grafanas
  - grafanadashboards
  - grafanadatasources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
#+kubebuilder:scaffold:rules
