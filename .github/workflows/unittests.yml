name: Unit Tests

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pyproject.toml'
      - '.github/workflows/unittests.yml'
      - 'Makefile'

  pull_request:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pyproject.toml'
      - '.github/workflows/unittests.yml'
      - 'Makefile'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          make dev-env

      - name: Test with pytest
        run: |
          make unit-tests
