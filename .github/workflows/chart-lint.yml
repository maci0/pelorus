name: Chart Lint

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pelorus-operator/helm-charts/**'
      - 'pelorus-operator/**'
      - '.github/workflows/chart-lint.yml'
      - 'lintconf.yaml'
      - 'Makefile'

  pull_request:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pelorus-operator/helm-charts/**'
      - 'pelorus-operator/**'
      - '.github/workflows/chart-lint.yml'
      - 'lintconf.yaml'
      - 'Makefile'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt
            pyproject.toml

      - name: Lint charts
        run: make chart-lint
