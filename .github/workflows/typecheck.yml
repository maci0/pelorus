name: Type Check

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pyproject.toml'
      - '.github/workflows/typecheck.yml'
      - 'Makefile'

  pull_request:
    branches: [ main ]
    paths:
      - 'exporters/**'
      - 'pyproject.toml'
      - '.github/workflows/typecheck.yml'
      - 'Makefile'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt
            pyproject.toml

      - name: Install dependencies
        run: make dev-env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Type Check
        continue-on-error: true
        run: make typecheck
